    <!-- Structured Data: FAQPage (common search queries) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a CP12 gas safety certificate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A CP12 (also known as a Landlord Gas Safety Record or LGSR) is a legal document that must be issued by a Gas Safe registered engineer after inspecting gas appliances in a rented property. Landlords are required by law to have gas appliances checked every 12 months."
          }
        },
        {
          "@type": "Question",
          "name": "Is GasCertPal free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, GasCertPal is completely free to download and use. There are no subscriptions, no hidden costs, and no premium tiers. All features including CP12 certificates, invoices, quotes, and job management are available for free."
          }
        },
        {
          "@type": "Question",
          "name": "Is GasCertPal Gas Safe compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, CP12 certificates generated through GasCertPal meet all legal requirements under the Gas Safety (Installation and Use) Regulations 1998. The app is designed specifically for Gas Safe registered engineers in the UK."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use GasCertPal offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, GasCertPal works without an internet connection. You can create certificates, invoices, and manage jobs on site even with no signal. Your data syncs automatically when you're back online."
          }
        }
      ]
    }
