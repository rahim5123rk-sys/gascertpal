    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is a CP12 gas safety certificate?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A CP12 (also known as a Landlord Gas Safety Record or LGSR) is a legal document that must be issued by a Gas Safe registered engineer after inspecting gas appliances in a rented property. Landlords are required by law to have gas appliances checked every 12 months."
          }
        },
        {
          "@type": "Question",
          "name": "Is GasPilot free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, GasPilot is completely free to download and use. There are no subscriptions, no hidden costs, and no premium tiers. All features including CP12 certificates, invoices, quotes, and job management are available for free."
          }
        },
        {
          "@type": "Question",
          "name": "Is GasPilot Gas Safe compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, CP12 certificates generated through GasPilot meet all legal requirements under the Gas Safety (Installation and Use) Regulations 1998. The app is designed specifically for Gas Safe registered engineers in the UK."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use GasPilot offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, GasPilot works without an internet connection. You can create certificates, invoices, and manage jobs on site even with no signal. Your data syncs automatically when you're back online."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I download GasPilot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GasPilot is available as a free download on the Apple App Store for iPhone and iPad, and on Google Play for Android devices. Search for 'GasPilot' or visit gascertpal.com to find the download links."
          }
        }
      ]
    }
